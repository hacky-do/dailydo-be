name: backend-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${DB_TIMEZONE}
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app

  user-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: user-api
        APP_PORT: 4000
        NODE_ENV: development
    restart: unless-stopped
    env_file: .env.local
    environment:
      USER_API_PORT: "${USER_API_PORT:-4000}"
      REDIS_HOST: redis
      NODE_ENV: development
      NODE_OPTIONS: --no-deprecation
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSL: "false"
    ports:
      - "${USER_API_PORT:-4000}:${USER_API_PORT:-4000}"
    depends_on:
      - postgres
      - redis
    networks:
      - app

  batch:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: batch
        APP_PORT: 4002
        NODE_ENV: development
    restart: unless-stopped
    env_file: .env.local
    environment:
      BATCH_PORT: "${BATCH_PORT:-4002}"
      REDIS_HOST: redis
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSL: "false"
    ports:
      - "${BATCH_PORT:-4002}:${BATCH_PORT:-4002}"
    depends_on:
      - postgres
      - redis
    networks:
      - app

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-api
    networks:
      - app

volumes:
  postgres-data:
  redis-data:

networks:
  app:
    driver: bridge
