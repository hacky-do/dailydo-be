name: CI/CD

on:
  push:
    branches: [dev]

jobs:
  # ── 1. Build & push Docker images to Docker Hub ───────────────────────────
  build:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: user-api
            port: 4000
            image: dailydo-user-api
          - app: batch
            port: 4002
            image: dailydo-batch
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            APP_NAME=${{ matrix.app }}
            APP_PORT=${{ matrix.port }}
            NODE_ENV=production
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to:   type=gha,scope=${{ matrix.app }},mode=max

  # ── 2. Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # 2-1. 배포에 필요한 파일만 EC2로 전송
      - name: Sync deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml,docker/nginx/conf.d/default.conf,scripts/deploy.sh"
          target:   /home/ubuntu/app

      # 2-2. .env 작성 + 이미지 pull + 서비스 기동
      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1
        env:
          APP_ENV:           ${{ secrets.APP_ENV }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG:         ${{ github.sha }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     APP_ENV,DOCKERHUB_USERNAME,IMAGE_TAG
          script: |
            set -e
            cd /home/ubuntu/app

            # .env 파일을 GitHub Secret에서 복원
            printf '%s' "$APP_ENV" > .env

            # docker-compose 이미지 변수 내보내기
            export DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME"
            export IMAGE_TAG="$IMAGE_TAG"

            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh
